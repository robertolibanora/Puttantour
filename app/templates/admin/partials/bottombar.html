<div class="sil-dock-wrap">
  <nav class="sil-dock sil-dock--admin" aria-label="Navigazione giudice">
    <a href="{{ url_for('admin.news') }}"
       class="sil-dock__item{% if request.endpoint == 'admin.news' %} is-active{% endif %}">
      <span class="sil-dock__glyph" aria-hidden="true">◈</span>
      <span class="sil-dock__label">News</span>
    </a>
    <a href="{{ url_for('admin.rules') }}"
       class="sil-dock__item{% if request.endpoint == 'admin.rules' %} is-active{% endif %}">
      <span class="sil-dock__glyph" aria-hidden="true">§</span>
      <span class="sil-dock__label">Regole</span>
    </a>
    <a href="{{ url_for('admin.classifica') }}"
       class="sil-dock__item{% if request.endpoint in ('admin.classifica', 'admin.player_detail') %} is-active{% endif %}">
      <span class="sil-dock__glyph" aria-hidden="true">✦</span>
      <span class="sil-dock__label">Classifica</span>
    </a>
    <a href="{{ url_for('user.logout') }}" class="sil-dock__item sil-dock__logout" title="Esci" aria-label="Esci">⇲</a>
  </nav>
</div>
