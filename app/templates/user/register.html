{% extends 'user/auth_base.html' %}
{% block title %}Registrati — {{ app_name }}{% endblock %}
{% block content %}
<section class="sil-hero sil-hero--tight">
  <p class="sil-eyebrow">Registrazione</p>
  <h1 class="sil-title">Registrati</h1>
</section>

<div class="sil-panel sil-panel--narrow">
  <p class="sil-lead">Crea il tuo profilo in classifica. I punti li assegna solo l’admin.</p>
  <form method="post" class="sil-form">
    <div class="sil-field">
      <label class="sil-field__label" for="name">Nome visualizzato in classifica</label>
      <input class="sil-input" id="name" type="text" name="name" required placeholder="Come vuoi apparire" maxlength="80">
    </div>
    <div class="sil-field">
      <label class="sil-field__label" for="username">Nome utente (login)</label>
      <input class="sil-input" id="username" type="text" name="username" required placeholder="solo lettere e numeri" autocomplete="username" pattern="[a-zA-Z0-9._-]{3,32}" minlength="3" maxlength="32" title="3–32 caratteri: lettere, numeri, . _ -">
    </div>
    <div class="sil-field">
      <label class="sil-field__label" for="password">Password</label>
      <input class="sil-input" id="password" type="password" name="password" required minlength="6" autocomplete="new-password">
    </div>
    <div class="sil-field">
      <label class="sil-field__label" for="password2">Ripeti password</label>
      <input class="sil-input" id="password2" type="password" name="password2" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="sil-btn">Crea account</button>
  </form>
  <p class="sil-lead sil-lead--after">
    Hai già un account? <a href="{{ url_for('user.login') }}">Accedi</a>.
  </p>
</div>
{% endblock %}
